name: Scrape ETA API

on:
  repository_dispatch:
    types: [scrape_eta]

  workflow_dispatch:
    inputs:
      source:
        description: "Trigger source"
        required: false
        default: "manual"
      ts:
        description: "ISO timestamp"
        required: false
        default: ""

concurrency:
  group: scrape-eta
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_SOURCE_TABLE: ${{ vars.SUPABASE_SOURCE_TABLE }}
      SUPABASE_SOURCE_NAME_COLUMN: ${{ vars.SUPABASE_SOURCE_NAME_COLUMN }}
      SUPABASE_SOURCE_URL_COLUMN: ${{ vars.SUPABASE_SOURCE_URL_COLUMN }}
      SUPABASE_OUTPUT_TABLE: ${{ vars.SUPABASE_OUTPUT_TABLE }}
      SUPABASE_OUTPUT_TIMESTAMP_COLUMN: ${{ vars.SUPABASE_OUTPUT_TIMESTAMP_COLUMN }}
      SUPABASE_OUTPUT_COLUMNS: ${{ vars.SUPABASE_OUTPUT_COLUMNS }}
      SCRAPER_HEADFUL: ${{ vars.SCRAPER_HEADFUL }}
      SCRAPER_TIMEOUT_MS: ${{ vars.SCRAPER_TIMEOUT_MS }}
      STORE_ETA_DEBUG: ${{ vars.STORE_ETA_DEBUG }}
      STORE_ETA_PRIVATE_XPATHS: ${{ secrets.STORE_ETA_PRIVATE_XPATHS || vars.STORE_ETA_PRIVATE_XPATHS }}
      STORE_ETA_PRIVATE_CONSENT_BUTTONS: ${{ secrets.STORE_ETA_PRIVATE_CONSENT_BUTTONS || vars.STORE_ETA_PRIVATE_CONSENT_BUTTONS }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package
        run: pip install -e .

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Log trigger info
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "Source: ${{ github.event.inputs.source || github.event.client_payload.source || 'unknown' }}"
          echo "Timestamp: ${{ github.event.inputs.ts || github.event.client_payload.ts || '' }}"

      - name: Validate required env
        run: |
          if [ -z "${STORE_ETA_PRIVATE_XPATHS}" ]; then
            echo "ERROR: STORE_ETA_PRIVATE_XPATHS is empty or not available in this run."
            echo "Check repo/org secrets or vars and event permissions."
            exit 1
          fi
          echo "STORE_ETA_PRIVATE_XPATHS loaded (length: ${#STORE_ETA_PRIVATE_XPATHS})"

      - name: Run scraper
        run: python src/store_eta/__main__.py
