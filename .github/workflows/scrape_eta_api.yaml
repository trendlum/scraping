name: Scrape ETA API

on:
  repository_dispatch:
    types: [scrape_eta]
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_SOURCE_TABLE: ${{ vars.SUPABASE_SOURCE_TABLE }}
      SUPABASE_SOURCE_NAME_COLUMN: ${{ vars.SUPABASE_SOURCE_NAME_COLUMN }}
      SUPABASE_SOURCE_URL_COLUMN: ${{ vars.SUPABASE_SOURCE_URL_COLUMN }}
      SUPABASE_OUTPUT_TABLE: ${{ vars.SUPABASE_OUTPUT_TABLE }}
      SUPABASE_OUTPUT_TIMESTAMP_COLUMN: ${{ vars.SUPABASE_OUTPUT_TIMESTAMP_COLUMN }}
      SUPABASE_OUTPUT_COLUMNS: ${{ vars.SUPABASE_OUTPUT_COLUMNS }}
      SCRAPER_HEADFUL: ${{ vars.SCRAPER_HEADFUL }}
      SCRAPER_TIMEOUT_MS: ${{ vars.SCRAPER_TIMEOUT_MS }}
      STORE_ETA_DEBUG: ${{ vars.STORE_ETA_DEBUG }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -e .

      - run: python -m playwright install --with-deps chromium

      - run: python src/store_eta/__main__.py
